version: '3.9'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: smart_health_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_health
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Python AI Engine (FastAPI + XGBoost) ─────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: smart_health_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Node.js Backend (Express + API) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_health_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai-engine:
        condition: service_started
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: smart_health
      DB_USER: postgres
      DB_PASSWORD: postgres
      AI_ENGINE_URL: http://ai-engine:8000
      FACILITY_LAT: 28.6139
      FACILITY_LNG: 77.2090
      GEOFENCE_RADIUS_METERS: 200
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── React Frontend (Vite Dev Server) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_health_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pg_data:
    driver: local
